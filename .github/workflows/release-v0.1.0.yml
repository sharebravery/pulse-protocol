name: Remove accidental protocol release

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-v0.1.0.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Remove release and tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view v0.1.0 >/dev/null 2>&1; then
            gh release delete v0.1.0 --cleanup-tag --yes
          else
            gh api --method DELETE repos/${GH_REPO}/git/refs/tags/v0.1.0 || true
          fi
