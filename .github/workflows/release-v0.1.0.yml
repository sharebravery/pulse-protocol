name: Release protocol v0.1.0

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-v0.1.0.yml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create immutable version reference
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_COMMIT: 62de094c02ce4ee74de866b1c1ad9810b7472a1f
        run: |
          set -euo pipefail
          git config user.name "pulse-protocol[bot]"
          git config user.email "pulse-protocol[bot]@users.noreply.github.com"
          if git rev-parse "refs/tags/v0.1.0" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 v0.1.0)" = "$TARGET_COMMIT"
          else
            git tag -a v0.1.0 "$TARGET_COMMIT" -m "Pulse Protocol v0.1.0"
            git push origin refs/tags/v0.1.0
          fi
          if ! gh release view v0.1.0 >/dev/null 2>&1; then
            gh release create v0.1.0 \
              --verify-tag \
              --title "Pulse Protocol v0.1.0" \
              --notes "First stable Pulse protocol package. Zod 4 is the single source of truth for x-review-payload/v1, with inferred TypeScript types and generated JSON Schema."
          fi
