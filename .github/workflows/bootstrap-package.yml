name: Bootstrap protocol package

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-package.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm check
      - name: Commit refreshed lockfile
        run: |
          git config user.name "pulse-protocol[bot]"
          git config user.email "pulse-protocol[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "refresh protocol package lockfile"
          git push origin HEAD:main
