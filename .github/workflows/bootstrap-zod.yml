name: Bootstrap Zod protocol

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-zod.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm generate
      - run: pnpm test
      - name: Commit generated contract artifacts
        run: |
          git config user.name "pulse-protocol[bot]"
          git config user.email "pulse-protocol[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml schemas/x-review-payload/v1.schema.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "generate Zod protocol artifacts"
          git push origin HEAD:main
