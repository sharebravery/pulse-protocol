name: Validate protocol

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate
      - name: Commit generated schema on the PR branch
        run: |
          if ! git diff --quiet -- schemas; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add schemas/x-review-payload/v1.schema.json
            git commit -m "update generated X review schema"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - run: pnpm typecheck
      - run: pnpm test
      - name: Verify generated contracts are current
        run: git diff --exit-code -- schemas
      - run: pnpm build
