name: Validate protocol

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm generate
      - name: Upload generated X content schema
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x-content-schema
          path: schemas/x-content/v1.schema.json
          if-no-files-found: error
          retention-days: 1
      - run: pnpm test
      - name: Verify generated contracts are current
        run: git diff --exit-code -- schemas
      - run: pnpm build
