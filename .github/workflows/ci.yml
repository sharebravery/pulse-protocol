name: Validate protocol

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test
