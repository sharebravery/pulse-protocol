name: Generate XHS schema

on:
  push:
    branches:
      - agent/add-xhs-content

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-xhs-content
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test -- --exclude tests/xhs-content.test.ts
      - run: pnpm generate
      - name: Commit generated schema
        run: |
          if git diff --quiet -- schemas; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schemas
          git commit -m "generate XHS content schema"
          git push origin HEAD:agent/add-xhs-content
